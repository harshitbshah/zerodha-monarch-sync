name: Daily Portfolio Sync

on:
  schedule:
    - cron: "0 10 * * 1-6"  # 5 AM EST / 6 AM EDT, Mon-Sat — captures Friday close on Saturday
  workflow_dispatch:       # Allow manual trigger

jobs:
  sync:
    runs-on: self-hosted
    permissions:
      contents: read
      actions: write       # needed to update KITE_ENCTOKEN_CACHE variable after fresh login
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install google-auth google-auth-httplib2 google-api-python-client pyotp requests

      - name: Initialize log with run header
        run: |
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" > sync_output.txt
          echo "─────────────────────────────────────────" >> sync_output.txt
          echo "" >> sync_output.txt

      - name: Generate Kite access token
        id: kite_auth
        env:
          ZERODHA_USER_ID: ${{ secrets.ZERODHA_USER_ID }}
          ZERODHA_PASSWORD: ${{ secrets.ZERODHA_PASSWORD }}
          ZERODHA_TOTP_KEY: ${{ secrets.ZERODHA_TOTP_KEY }}
          KITE_ENCTOKEN_CACHE: ${{ vars.KITE_ENCTOKEN_CACHE }}
        run: python kite_auth.py

      - name: Cache Kite access token
        run: |
          python - <<'EOF'
          import os, urllib.request, json
          token = os.environ["GH_TOKEN"]
          value = os.environ["ACCESS_TOKEN"]
          data = json.dumps({"name": "KITE_ENCTOKEN_CACHE", "value": value}).encode()
          req = urllib.request.Request(
              "https://api.github.com/repos/harshitbshah/portfolio-sync/actions/variables/KITE_ENCTOKEN_CACHE",
              data=data, method="PATCH",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json",
                       "X-GitHub-Api-Version": "2022-11-28", "Content-Type": "application/json"},
          )
          urllib.request.urlopen(req)
          EOF
        env:
          GH_TOKEN: ${{ secrets.GH_VARIABLES_PAT }}
          ACCESS_TOKEN: ${{ steps.kite_auth.outputs.access_token }}

      - name: Sync Indian Portfolio → Google Sheet
        env:
          KITE_ACCESS_TOKEN: ${{ steps.kite_auth.outputs.access_token }}
          GSHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}
          GSHEET_SHEET_ID: ${{ vars.GSHEET_SHEET_ID }}
        run: set -o pipefail; python sync_indian_portfolio.py 2>&1 | tee -a sync_output.txt

      - name: Sync Zerodha → Monarch + PF Summary sheet
        env:
          GSHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}
          MONARCH_TOKEN: ${{ secrets.MONARCH_TOKEN }}
          GSHEET_SHEET_ID: ${{ vars.GSHEET_SHEET_ID }}
          GSHEET_TAB: ${{ vars.GSHEET_TAB }}
          GSHEET_LABEL: ${{ vars.GSHEET_LABEL }}
          MONARCH_ACCOUNT_NAME: ${{ vars.MONARCH_ACCOUNT_NAME }}
          ACCOUNTS_JSON: ${{ vars.ACCOUNTS_JSON }}
          SGOV_LABEL: ${{ vars.SGOV_LABEL }}
          PF_BREAKDOWN_LABEL: ${{ vars.PF_BREAKDOWN_LABEL }}
        run: set -o pipefail; python sync.py 2>&1 | tee -a sync_output.txt

      - name: Sync Monarch holdings → US Portfolio sheet
        env:
          GSHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}
          MONARCH_TOKEN: ${{ secrets.MONARCH_TOKEN }}
          GSHEET_SHEET_ID: ${{ vars.GSHEET_SHEET_ID }}
        run: set -o pipefail; python sync_us_portfolio.py 2>&1 | tee -a sync_output.txt

      - name: Format success email
        if: success()
        id: format
        run: python format_email.py

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.NOTIFY_EMAIL }}
          subject: ${{ steps.format.outputs.subject }}
          html_body: "file://email_body.html"

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.NOTIFY_EMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.NOTIFY_EMAIL }}
          subject: "❌ Portfolio sync FAILED — ${{ github.run_id }}"
          body: "file://sync_output.txt"
